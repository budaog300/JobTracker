services:
  app:
    build: .
    image: job_tracker_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.db
      - .env.ai
      - .env.auth
    depends_on:
      - db

  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5433:5432"
    env_file:
      - .env.db
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
